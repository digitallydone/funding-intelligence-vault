<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="amber1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
  </defs>

  <!-- Diamond mark -->
  <g transform="translate(10, 12)">
    <!-- Outer diamond -->
    <polygon points="28,0 56,28 28,56 0,28" fill="none" stroke="url(#amber1)" stroke-width="2.5"/>
    <!-- Inner diamond -->
    <polygon points="28,12 44,28 28,44 12,28" fill="url(#amber1)" opacity="0.15"/>
    <!-- Center dot -->
    <circle cx="28" cy="28" r="5" fill="url(#amber1)"/>
    <!-- Cross lines -->
    <line x1="28" y1="0" x2="28" y2="56" stroke="url(#amber1)" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="28" x2="56" y2="28" stroke="url(#amber1)" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- BOS wordmark -->
  <text x="82" y="46" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="800" font-size="36" letter-spacing="-1" fill="#0F172A">BOS</text>

  <!-- Divider -->
  <line x1="82" y1="56" x2="172" y2="56" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="82" y="70" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="400" font-size="9.5" letter-spacing="2.5" fill="#64748B">BUSINESS OPPORTUNITY SYSTEMS</text>
</svg>
