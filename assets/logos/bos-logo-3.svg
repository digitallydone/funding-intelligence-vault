<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <defs>
    <linearGradient id="textGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
  </defs>

  <!-- Hexagon mark -->
  <g transform="translate(8, 10)">
    <polygon points="30,0 52,13 52,39 30,52 8,39 8,13"
             fill="none" stroke="#0F172A" stroke-width="2.5"/>
    <!-- Inner accent -->
    <polygon points="30,10 44,18 44,34 30,42 16,34 16,18"
             fill="#F59E0B" opacity="0.12"/>
    <!-- B letterform inside hex -->
    <text x="30" y="36" text-anchor="middle"
          font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-weight="900" font-size="22" fill="#0F172A">B</text>
  </g>

  <!-- OS in large type — amber accent on O -->
  <text x="76" y="50" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="900" font-size="36" letter-spacing="-1" fill="#0F172A">O</text>
  <text x="76" y="50" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="900" font-size="36" letter-spacing="-1" fill="#F59E0B" opacity="1">O</text>
  <text x="108" y="50" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="900" font-size="36" letter-spacing="-1" fill="#0F172A">S</text>

  <!-- Tagline below -->
  <text x="76" y="66" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="500" font-size="8" letter-spacing="3" fill="#94A3B8">BUSINESS OPPORTUNITY SYSTEMS</text>

  <!-- Amber dot accent -->
  <circle cx="289" cy="50" r="4" fill="#F59E0B"/>
</svg>
